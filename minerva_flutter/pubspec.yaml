name: schoolapp
description: "Smart School - A comprehensive school management app"
publish_to: 'none'

version: 5.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^0.13.6
  http_parser: ^4.0.2
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  file_picker: ^8.1.2
  path_provider: ^2.1.2
  firebase_core: ^2.32.0
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^14.0.0
  # permission_handler: ^11.3.0  # Removed due to Windows build issues
  video_player: ^2.8.2
  chewie: ^1.7.5
  youtube_player_flutter: ^9.0.1
  flutter_pdfview: ^1.3.2
  webview_flutter: ^4.4.2
  open_file: ^3.3.2
  flutter_html: ^3.0.0-beta.2
  qr_flutter: ^4.1.0
  barcode_widget: ^2.0.4
  intl: ^0.19.0
  printing: ^5.13.0
  provider: ^6.1.1
  path: ^1.9.0
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  flutter_local_notifications:
    path: third_party/flutter_local_notifications_patched

# Note: permission_handler was removed due to Windows build issues with NuGet downloads
# If you need permission handling in the future, consider using platform-specific alternatives

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#1E3A8A"
    theme_color: "#3B82F6"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/app_icon.png"

